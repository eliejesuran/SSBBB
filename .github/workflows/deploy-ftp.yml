name: Deploy FTP Infomaniak

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Infomaniak FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Répertoire local poussé (racine du dépôt)
          local-dir: ./
          # Répertoire distant sur le serveur (souvent /web/ ou /sites/... chez Infomaniak)
          server-dir: ./
          # Fichiers/dossiers à ne PAS envoyer
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/CLAUDE.md
            **/README.md
            **/*.json
