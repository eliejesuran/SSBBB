<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="author" content="Elie JESURAN">
<meta name="copyright" content="© 2026 Elie JESURAN">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSBBB — Fiche Technique 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0a0a0a; --card: #161616; --border: #2a2a2a;
  --gold: #c8a84b; --gold-dim: #6b5a28; --gold-light: #D9C382;
  --white: #f0ece0; --grey: #888880; --muted: #444440;
  --grain-val: 0.4;
}

html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--black); color: var(--white);
  font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: var(--grain-val, 0.4);
}

/* ── HEADER ── */
header {
  position: relative; padding: 40px 40px 32px;
  border-bottom: 1px solid var(--border); overflow: hidden;
}
header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.editable-field {
  background: transparent; border: none; color: inherit;
  font-family: inherit; font-size: inherit; font-weight: inherit;
  letter-spacing: inherit; line-height: inherit;
  outline: none; cursor: text; width: 100%;
  border-bottom: 1px dashed transparent; transition: border-color 0.2s;
}
.editable-field:focus { border-bottom-color: var(--gold-dim); }
.editable-field::placeholder { color: var(--muted); }

.band-name-input {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(38px, 8vw, 100px);
  letter-spacing: 0.08em; line-height: 0.9; color: var(--white);
  text-shadow: 0 0 80px rgba(200,168,75,0.2); display: block;
}
.subtitle-input {
  font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--gold-light); margin-top: 14px; display: block;
}

/* ── HEADER BADGES (dynamic) ── */
.badge-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; align-items: center; }

.header-badge {
  border: 1px solid var(--gold-dim); padding: 5px 12px;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); background: rgba(200,168,75,0.05);
  display: inline-flex; align-items: center; gap: 6px; position: relative;
}
.badge-editable {
  background: transparent; border: none; color: var(--gold);
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; outline: none; min-width: 40px; cursor: text;
}
.badge-delete-btn {
  background: none; border: none; cursor: pointer;
  color: var(--gold-dim); font-size: 13px; line-height: 1; padding: 0 0 0 4px;
  transition: color 0.15s; display: none;
}
.header-badge:hover .badge-delete-btn { display: inline; }
.badge-delete-btn:hover { color: #e74c3c; }

.btn-add-badge {
  border: 1px dashed var(--gold-dim); padding: 5px 10px;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold-dim); background: transparent; cursor: pointer;
  font-family: 'Space Mono', monospace; transition: all 0.15s;
}
.btn-add-badge:hover { color: var(--gold); border-color: var(--gold); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 12px 64px 12px 40px; border-bottom: 1px solid var(--border);
  background: var(--black);
  position: sticky; top: 0; z-index: 50;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.15s;
  border: 1px solid var(--gold-dim); color: var(--gold);
  background: rgba(200,168,75,0.05); white-space: nowrap;
}
.toolbar-btn:hover { background: rgba(200,168,75,0.12); border-color: var(--gold); }
.toolbar-btn:active { transform: scale(0.97); }
.toolbar-btn.pdf-btn { border-color: rgba(192,57,43,0.5); color: #e74c3c; background: rgba(192,57,43,0.06); }
.toolbar-btn.pdf-btn:hover { background: rgba(192,57,43,0.14); border-color: #e74c3c; }
.toolbar-btn.share-btn { border-color: rgba(88,214,141,0.45); color: #58d68d; background: rgba(88,214,141,0.06); }
.toolbar-btn.share-btn:hover { background: rgba(88,214,141,0.14); border-color: #58d68d; }

/* ── MAIN ── */
main { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; margin-bottom: 24px; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { border-bottom: 1px solid var(--gold-dim); }
thead th {
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.15em;
  color: var(--gold); padding: 10px 14px; text-align: left; font-weight: normal; white-space: nowrap;
}
thead th:nth-child(1) { width: 40px; text-align: center; }
thead th:last-child   { width: 32px; }
tbody tr { border-bottom: 1px solid rgba(42,42,42,0.8); transition: background 0.15s; }
tbody tr.drag-over { background: rgba(200,168,75,0.1) !important; outline: 1px dashed var(--gold-dim); }
tbody td { padding: 11px 14px; vertical-align: middle; }
tbody td:first-child { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: var(--muted); }

.name-editable {
  background: transparent; border: none; color: var(--white);
  font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
  width: 100%; outline: none; cursor: text;
  border-bottom: 1px dashed transparent; transition: border-color 0.15s; min-width: 120px;
}
.name-editable:focus { border-bottom-color: var(--gold-dim); }
.name-editable::placeholder { color: var(--muted); font-weight: normal; }

.comment-input {
  background: transparent; border: none; color: var(--grey);
  font-family: 'Space Mono', monospace; font-size: 11px; font-style: italic;
  width: 100%; outline: none; cursor: text; min-width: 120px;
  border-bottom: 1px dashed transparent; transition: border-color 0.15s;
}
.comment-input:focus { border-bottom-color: var(--gold-dim); color: var(--white); }
.comment-input::placeholder { color: var(--muted); opacity: 0.5; font-size: 10px; }

.drop-cell { min-width: 140px; min-height: 32px; padding: 8px 14px; cursor: pointer; }
.drop-cell.empty::after {
  content: attr(data-empty-label);
  font-size: 9px; letter-spacing: 0.15em; color: var(--muted); font-style: italic; opacity: 0.45;
}

.btn-remove-row {
  background: none; border: none; cursor: pointer; color: var(--muted);
  font-size: 18px; padding: 2px 5px; transition: color 0.15s; line-height: 1;
}
.btn-remove-row:hover { color: #e74c3c; }

.btn-add-musician {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(200,168,75,0.04); border: 1px dashed var(--gold-dim);
  color: var(--gold-dim); padding: 10px 20px;
  font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s; margin-bottom: 32px;
}
.btn-add-musician:hover { color: var(--gold); border-color: var(--gold); background: rgba(200,168,75,0.09); }

/* ── BADGES ── */
.micro-badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px; font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; border-radius: 2px;
  margin-right: 3px; margin-bottom: 2px;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s; position: relative; white-space: nowrap;
}
.micro-badge:hover { opacity: 0.7; transform: scale(0.96); }
.kick      { background: rgba(192,57,43,0.2);  color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }
.oh        { background: rgba(52,152,219,0.15); color: #5dade2; border: 1px solid rgba(52,152,219,0.3); }
.di        { background: rgba(39,174,96,0.15);  color: #58d68d; border: 1px solid rgba(39,174,96,0.3); }
.ampli     { background: rgba(200,168,75,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
.sm58      { background: rgba(155,89,182,0.15); color: #bb8fce; border: 1px solid rgba(155,89,182,0.3); }
.jack      { background: rgba(230,126,34,0.15); color: #f0a500; border: 1px solid rgba(230,126,34,0.3); }
.xlr       { background: rgba(100,100,100,0.2); color: #aaa;    border: 1px solid rgba(150,150,150,0.3); }
.nophantom { background: rgba(243,156,18,0.1);  color: #f39c12; border: 1px solid rgba(243,156,18,0.35); font-size: 9px; }

/* ── PALETTE ── */
.palette-section { border-top: 1px solid var(--border); padding-top: 24px; }
.palette-title-row {
  font-size: 10px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold-dim);
  margin-bottom: 8px; display: flex; align-items: center; gap: 14px;
}
.palette-title-row::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.palette-hint { font-size: 10px; color: var(--muted); margin-bottom: 12px; font-style: italic; }
.legend-palette { display: flex; flex-wrap: wrap; gap: 8px; }
.palette-badge {
  display: inline-flex; align-items: center;
  padding: 6px 13px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 2px; cursor: grab; user-select: none; transition: transform 0.15s, box-shadow 0.15s;
}
.palette-badge:active { cursor: grabbing; transform: scale(1.07); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.palette-badge:hover  { transform: translateY(-2px); }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border); padding: 20px 40px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--muted); letter-spacing: 0.18em;
  flex-wrap: wrap; gap: 10px; margin-top: 20px;
}

/* ══════════════════════════════════════════════
   THEME — bascule clair (sépia) / sombre
══════════════════════════════════════════════ */
/* Mode sépia (clair) : surcharge des variables de couleur */
html[data-theme="sepia"] {
  --black: #efe5cf; --card: #e7dabb; --border: #d2c198;
  --gold: #8a5a1c; --gold-dim: #c0a36a; --gold-light: #6e4f22;
  --white: #3a2c18; --grey: #7c6a49; --muted: #b0996e;
  --grain-val: 0.08;
}
html[data-theme="sepia"] .band-name-input { text-shadow: none; }

/* Lisibilité des badges micro/DI sur fond clair */
html[data-theme="sepia"] .kick      { background: rgba(192,57,43,0.14); color: #b03328; border-color: rgba(192,57,43,0.45); }
html[data-theme="sepia"] .oh        { background: rgba(41,128,185,0.14); color: #21618c; border-color: rgba(41,128,185,0.4); }
html[data-theme="sepia"] .di        { background: rgba(39,140,80,0.14);  color: #1e7a45; border-color: rgba(39,140,80,0.4); }
html[data-theme="sepia"] .ampli     { background: rgba(160,120,30,0.16); color: #7a5512; border-color: rgba(160,120,30,0.45); }
html[data-theme="sepia"] .sm58      { background: rgba(120,60,160,0.14); color: #6c3483; border-color: rgba(120,60,160,0.4); }
html[data-theme="sepia"] .jack      { background: rgba(200,110,20,0.16); color: #9c5806; border-color: rgba(200,110,20,0.45); }
html[data-theme="sepia"] .xlr       { background: rgba(90,80,60,0.14);   color: #5a4d36; border-color: rgba(90,80,60,0.4); }
html[data-theme="sepia"] .nophantom { background: rgba(180,120,10,0.16); color: #8a6206; border-color: rgba(180,120,10,0.45); }

/* Bouton bascule, en haut à droite */
#btn-theme-toggle {
  position: fixed; top: 12px; right: 14px; z-index: 300;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--gold-dim); background: var(--card);
  color: var(--gold); font-size: 18px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#btn-theme-toggle:hover { border-color: var(--gold); transform: scale(1.08); }
#btn-theme-toggle:active { transform: scale(0.94); }

/* ══════════════════════
   MOBILE BOTTOM SHEET
══════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 300;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: #1c1c1c; border: 1px solid var(--border); border-bottom: none;
  border-radius: 16px 16px 0 0; padding: 20px 20px 40px;
  width: 100%; max-width: 600px;
  animation: slideUp 0.22s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal-musician-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 4px; }
.modal-section-label { font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin: 16px 0 10px; }
.modal-current-badges { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; margin-bottom: 4px; }
.modal-badge-active {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 4px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.modal-badge-active::after { content: ' ✕'; opacity: 0.6; font-size: 10px; }
.modal-badge-active:active { transform: scale(0.93); }
.modal-add-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.modal-add-btn {
  padding: 12px 10px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 4px; cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent;
  text-align: center; display: flex; align-items: center; justify-content: center;
}
.modal-add-btn:active { transform: scale(0.94); opacity: 0.8; }
.modal-close {
  width: 100%; padding: 13px; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); color: var(--grey);
  font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer; border-radius: 4px; margin-top: 14px;
  -webkit-tap-highlight-color: transparent;
}

/* ── PDF OVERLAY ── */
.pdf-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.9); z-index: 500;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.pdf-overlay.active { display: flex; }
.pdf-overlay-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.2em; color: var(--gold); }
.pdf-spinner {
  width: 40px; height: 40px; border: 3px solid var(--gold-dim);
  border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#pdf-target {
  position: fixed; left: -9999px; top: 0; width: 900px;
  background: #0a0a0a; color: var(--white); font-family: 'Space Mono', monospace;
  padding: 0; pointer-events: none;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes rowIn  { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
header          { animation: fadeUp 0.5s ease both; }
.table-wrap     { animation: fadeUp 0.5s 0.1s ease both; }
.palette-section{ animation: fadeUp 0.5s 0.2s ease both; }
.new-row        { animation: rowIn 0.22s ease both; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  header, main, footer { padding-left: 16px; padding-right: 16px; }
  .toolbar { padding: 10px 56px 10px 16px; gap: 6px; }
  .toolbar-btn .label { display: none; }
  .toolbar-btn { padding: 9px 12px; }
  .palette-section { display: none; }
  table { font-size: 12px; }
  thead th { font-size: 12px; padding: 8px 10px; }
  tbody td { padding: 10px 10px; }
  .drop-cell { min-width: 110px; }
  .col-comment { display: none; }
}
</style>
</head>
<body>

<!-- ═══ BASCULE THÈME (haut droite) ═══ -->
<button id="btn-theme-toggle" title="Basculer clair / sombre" aria-label="Basculer le thème">🌙</button>

<!-- ═══ HEADER ═══ -->
<header>
  <input class="editable-field band-name-input" id="band-name" value="Super Sexy Big Boys Band" placeholder="Nom du groupe">
  <input class="editable-field subtitle-input" id="band-subtitle" value="Fiche Technique / Sounds / 2 juin 2026" placeholder="Sous-titre">
  <div class="badge-row" id="badge-row">
    <!-- badges rendered by JS -->
  </div>
</header>

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <button class="toolbar-btn" id="btn-new" title="Repartir d'une fiche vierge">
    <span>📄</span><span class="label">Nouvelle</span>
  </button>
  <button class="toolbar-btn pdf-btn" id="btn-pdf" title="Télécharger en PDF (à envoyer à l'ingé son)">
    <span>⬇</span><span class="label">Export PDF</span>
  </button>
  <button class="toolbar-btn share-btn" id="btn-share" title="Copier un lien partageable vers cette fiche">
    <span>🔗</span><span class="label">Partager</span>
  </button>
  <button class="toolbar-btn" id="btn-import" title="Ouvrir une fiche sauvegardée (.html ou .json) pour la modifier">
    <span>📂</span><span class="label">Ouvrir</span>
  </button>
  <button class="toolbar-btn" id="btn-save" title="Sauvegarder un fichier de secours réouvrable">
    <span>💾</span><span class="label">Sauvegarder</span>
  </button>
  <button class="toolbar-btn" id="btn-json" title="Exporter les données seules (.json)">

</div>

<!-- ═══ MAIN ═══ -->
<main>
  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Musicien</th>
          <th>Micro / DI</th>
          <th class="col-comment">Notes / Commentaires</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="musician-tbody"></tbody>
    </table>
  </div>
  <button class="btn-add-musician" id="btn-add">
    <span style="font-size:17px;line-height:1">+</span> Ajouter un musicien
  </button>
  <div class="palette-section">
    <div class="palette-title-row">Palette de badges</div>
    <div class="palette-hint">🖱 Glisse sur une ligne pour ajouter &nbsp;|&nbsp; Clique sur un badge dans le tableau pour le retirer</div>
    <div class="legend-palette" id="palette"></div>
  </div>
</main>

<footer>
  <div id="band-title" style="color:var(--gold)">SUPER SEXY BIG BOYS BAND • FICHE TECHNIQUE</div>
  <div><input class="editable-field" id="footer-phone" value="+32 478 456 787" style="color:var(--gold);font-size:10px;letter-spacing:0.18em;width:160px" placeholder="Téléphone"></div>
  <div><input class="editable-field" id="footer-year" value="2026" style="color:var(--gold-light);font-size:10px;letter-spacing:0.18em;width:50px" placeholder="Année"></div>
</footer>

<!-- ═══ MOBILE BADGE MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-musician-name" id="modal-title">—</div>
    <div class="modal-section-label">Badges actifs — tap pour retirer</div>
    <div class="modal-current-badges" id="modal-current"></div>
    <div class="modal-section-label">Ajouter un badge</div>
    <div class="modal-add-grid" id="modal-grid"></div>
    <div class="modal-section-label" style="margin-top:18px">Commentaire</div>
    <input type="text" id="modal-comment" placeholder="Note libre…"
      style="width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
             color:var(--white);font-family:'Space Mono',monospace;font-size:12px;
             padding:10px 14px;outline:none;border-radius:4px;margin-bottom:4px;letter-spacing:0.05em;">

<!-- ═══ PDF OVERLAY ═══ -->
<div class="pdf-overlay" id="pdf-overlay">
  <div class="pdf-spinner"></div>
  <div class="pdf-overlay-text">Génération du PDF…</div>
</div>

<div id="pdf-target"></div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const LABELS = {
  kick:'Kick', oh:'Overhead', di:'DI', ampli:'Ampli repiqué',
  sm58:'SM58', xlr:'XLR', jack:'Jack', nophantom:'⚠ Sans phantom',
};
const ALL_TYPES = Object.keys(LABELS);

const BADGE_COLORS = {
  kick:      { bg:'#3a1212', text:'#e74c3c', border:'#7a2020' },
  oh:        { bg:'#0e2535', text:'#5dade2', border:'#1e5070' },
  di:        { bg:'#0e2a18', text:'#58d68d', border:'#1e5a30' },
  ampli:     { bg:'#2a2008', text:'#c8a84b', border:'#6b5a28' },
  sm58:      { bg:'#1e0f2e', text:'#bb8fce', border:'#4a2a6e' },
  jack:      { bg:'#2a1a04', text:'#f0a500', border:'#6a4010' },
  xlr:       { bg:'#1a1a1a', text:'#aaaaaa', border:'#3a3a3a' },
  nophantom: { bg:'#2a1e04', text:'#f39c12', border:'#6a4e10' },
};

// ── Header info badges (dynamic array) ──
let headerBadges = [
  { id: 'count', label: null, fixed: true },   // musicien count, not editable label
  { id: 'h1', label: '3 retours façade' },
  { id: 'h2', label: '4m × 3m min' },
  { id: 'h3', label: 'Setup flexible' },
];
let nextBadgeId = 4;

let musicians = [
  { id:1,  name:'Louis Legend — Drums 🥁',      badges:['kick','oh'],               comment:'' },
  { id:2,  name:'Pr Jo — Bass 🎸',              badges:['di','xlr'],                comment:'' },
  { id:3,  name:'Piet — Guitar 🎸',             badges:['xlr'],                     comment:'' },
  { id:4,  name:'El Jefe — Guitar 🎸',          badges:['ampli'],                   comment:'' },
  { id:5,  name:'Pr Thib — Percussions 🥁',     badges:['oh'],                      comment:'' },
  { id:6,  name:'Elie — Saxophone 🎷',          badges:['xlr','nophantom'],         comment:'' },
  { id:7,  name:'Seabass — Trumpet 🎺+🎤',      badges:['jack','nophantom','sm58'], comment:'' },
  { id:8,  name:'Louis 5000 — Lead Vocal 🎤',   badges:['sm58'],                    comment:'' },
  { id:9,  name:'Dr Nico — Chœur 🎤',           badges:['sm58'],                    comment:'' },
  { id:10, name:'Rahul 🎶',                      badges:[],                          comment:'' },
  { id:11, name:'Q 🎶',                          badges:[],                          comment:'' },
];
let nextId = 12;
let dragType = null;
let modalTarget = null;

// ── Badges personnalisés (créés depuis la palette) ──
let customBadges = [];   // [{ type:'c1', label:'HF', color:'#9b59b6' }]
let nextCustomId = 1;

const byId = id => document.getElementById(id);
const isMobile = () => window.innerWidth <= 640 || ('ontouchstart' in window);

/* ══════════════════════════════════════════
   BADGES — résolution label/couleur (intégrés + perso)
══════════════════════════════════════════ */
function allTypes()    { return [...ALL_TYPES, ...customBadges.map(b => b.type)]; }
function isCustom(type) { return !LABELS[type]; }
function findCustom(type) { return customBadges.find(b => b.type === type); }
function labelOf(type) {
  if (LABELS[type]) return LABELS[type];
  const c = findCustom(type);
  return c ? c.label : type;
}
function hexToRgb(hex) {
  const h = String(hex || '').replace('#', '');
  const n = h.length === 3 ? h.split('').map(c => c + c).join('') : h.padEnd(6, '0');
  return { r: parseInt(n.slice(0, 2), 16) || 0, g: parseInt(n.slice(2, 4), 16) || 0, b: parseInt(n.slice(4, 6), 16) || 0 };
}
function customColors(hex) {
  const { r, g, b } = hexToRgb(hex);
  return { bg: `rgba(${r},${g},${b},0.16)`, text: hex, border: `rgba(${r},${g},${b},0.5)` };
}
// Applique la couleur d'un badge à un élément (classe CSS si intégré, style inline si perso)
function applyBadgeStyle(el, type) {
  if (LABELS[type]) { el.classList.add(type); return; }
  const c = findCustom(type);
  if (c) {
    const col = customColors(c.color);
    el.style.background = col.bg;
    el.style.color = col.text;
    el.style.border = '1px solid ' + col.border;
  }
}

/* ══════════════════════════════════════════
   HEADER BADGES
══════════════════════════════════════════ */
function updateCount() {
  const countEl = byId('badge-count-span');
  if (countEl) countEl.textContent = musicians.length + ' musicien' + (musicians.length !== 1 ? 's' : '');
}

function renderHeaderBadges() {
  const row = byId('badge-row');
  row.innerHTML = '';

  headerBadges.forEach(b => {
    const div = document.createElement('div');
    div.className = 'header-badge';

    if (b.fixed) {
      // musician count — not deletable
      const span = document.createElement('span');
      span.id = 'badge-count-span';
      span.textContent = musicians.length + ' musicien' + (musicians.length !== 1 ? 's' : '');
      div.appendChild(span);
    } else {
      const inp = document.createElement('input');
      inp.className = 'badge-editable';
      inp.value = b.label;
      inp.style.minWidth = Math.max(60, b.label.length * 8) + 'px';
      inp.addEventListener('input', () => {
        b.label = inp.value;
        inp.style.minWidth = Math.max(60, inp.value.length * 8) + 'px';
      });
      div.appendChild(inp);

      const del = document.createElement('button');
      del.className = 'badge-delete-btn';
      del.innerHTML = '×';
      del.title = 'Supprimer ce badge';
      del.addEventListener('click', () => {
        headerBadges = headerBadges.filter(x => x.id !== b.id);
        renderHeaderBadges();
      });
      div.appendChild(del);
    }

    row.appendChild(div);
  });

  if (typeof saveToStorage === 'function') saveToStorage();

  // + Add badge button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-badge';
  addBtn.textContent = '+ badge';
  addBtn.addEventListener('click', () => {
    headerBadges.push({ id: 'h' + nextBadgeId++, label: 'Nouveau' });
    renderHeaderBadges();
    // focus last editable
    const inputs = byId('badge-row').querySelectorAll('.badge-editable');
    if (inputs.length) { inputs[inputs.length-1].focus(); inputs[inputs.length-1].select(); }
  });
  row.appendChild(addBtn);
}

/* ══════════════════════════════════════════
   TABLE
══════════════════════════════════════════ */
function renderTable(animateLast = false) {
  const tbody = byId('musician-tbody');
  tbody.innerHTML = '';
  musicians.forEach((m, idx) => {
    const tr = document.createElement('tr');
    tr.dataset.id = m.id;
    if (animateLast && idx === musicians.length - 1) tr.classList.add('new-row');

    const tdNum = document.createElement('td');
    tdNum.textContent = idx + 1;
    tr.appendChild(tdNum);

    const tdName = document.createElement('td');
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'name-editable';
    inp.value = m.name; inp.placeholder = 'Nom du musicien…';
    inp.addEventListener('input', () => m.name = inp.value);
    tdName.appendChild(inp);
    tr.appendChild(tdName);

    const tdDrop = document.createElement('td');
    tdDrop.className = 'drop-cell' + (m.badges.length === 0 ? ' empty' : '');
    tdDrop.dataset.emptyLabel = isMobile() ? '↓ toucher' : '↓ déposer';
    m.badges.forEach((type, bidx) => {
      const span = document.createElement('span');
      span.className = 'micro-badge';
      applyBadgeStyle(span, type);
      span.textContent = labelOf(type);
      span.title = 'Cliquer pour retirer';
      span.addEventListener('click', e => { e.stopPropagation(); m.badges.splice(bidx, 1); renderTable(); });
      tdDrop.appendChild(span);
    });
    tdDrop.addEventListener('click', e => { if (e.target.classList.contains('micro-badge')) return; openModal(m.id); });
    tr.appendChild(tdDrop);

    const tdCmt = document.createElement('td'); tdCmt.className = 'col-comment';
    const cmtInp = document.createElement('input');
    cmtInp.type = 'text'; cmtInp.className = 'comment-input';
    cmtInp.value = m.comment || ''; cmtInp.placeholder = 'Note…';
    cmtInp.addEventListener('input', () => m.comment = cmtInp.value);
    tdCmt.appendChild(cmtInp);
    tr.appendChild(tdCmt);

    const tdDel = document.createElement('td');
    const btnDel = document.createElement('button');
    btnDel.className = 'btn-remove-row'; btnDel.innerHTML = '×';
    btnDel.addEventListener('click', () => { musicians = musicians.filter(x => x.id !== m.id); renderTable(); updateCount(); });
    tdDel.appendChild(btnDel);
    tr.appendChild(tdDel);

    tr.addEventListener('dragover', e => { e.preventDefault(); tr.classList.add('drag-over'); });
    tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
    tr.addEventListener('drop', e => { e.preventDefault(); tr.classList.remove('drag-over'); if (!dragType || m.badges.includes(dragType)) return; m.badges.push(dragType); renderTable(); });
    tbody.appendChild(tr);
  });
  updateCount();
  if (typeof saveToStorage === 'function') saveToStorage();
}

/* ── Palette ── */
function buildPalette() {
  const pal = byId('palette'); pal.innerHTML = '';
  allTypes().forEach(type => {
    const span = document.createElement('span');
    span.className = 'palette-badge';
    applyBadgeStyle(span, type);
    span.draggable = true;
    span.textContent = labelOf(type);
    span.addEventListener('dragstart', e => { dragType = type; e.dataTransfer.effectAllowed = 'copy'; });
    span.addEventListener('dragend', () => dragType = null);
    if (isCustom(type)) {
      const del = document.createElement('span');
      del.textContent = '×';
      del.title = 'Supprimer ce badge de la palette';
      del.style.cssText = 'margin-left:8px;cursor:pointer;font-weight:700;opacity:0.65;';
      del.addEventListener('click', e => { e.stopPropagation(); deleteCustomBadge(type); });
      del.addEventListener('mouseenter', () => del.style.opacity = '1');
      del.addEventListener('mouseleave', () => del.style.opacity = '0.65');
      span.appendChild(del);
    }
    pal.appendChild(span);
  });
  const add = document.createElement('button');
  add.className = 'btn-add-badge';
  add.textContent = '+ badge';
  add.title = 'Créer un badge personnalisé';
  add.addEventListener('click', addCustomBadge);
  pal.appendChild(add);
}

/* ── Badges personnalisés ── */
function addCustomBadge() {
  promptNewBadge((label, color) => {
    customBadges.push({ type: 'c' + (nextCustomId++), label, color });
    buildPalette();
    if (modalTarget) renderModal();
    saveToStorage();
    showToast('Badge « ' + label + ' » ajouté à la palette');
  });
}

function deleteCustomBadge(type) {
  customBadges = customBadges.filter(b => b.type !== type);
  musicians.forEach(m => { m.badges = m.badges.filter(t => t !== type); });
  buildPalette();
  renderTable();
  if (modalTarget) renderModal();
}

// Petite boîte de dialogue (nom + couleur) — fonctionne desktop & mobile
function promptNewBadge(onDone) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = "background:var(--card);border:1px solid var(--gold-dim);border-radius:10px;padding:22px;width:300px;max-width:92vw;font-family:'Inter',sans-serif;";
  box.innerHTML =
    "<div style=\"font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:0.1em;color:var(--gold);margin-bottom:16px;\">Nouveau badge</div>"
    + '<label style="font-size:11px;color:var(--grey);letter-spacing:0.08em;">Nom</label>'
    + "<input id=\"nb-name\" maxlength=\"24\" placeholder=\"ex : HF, In-Ear, Talkback…\" style=\"width:100%;margin:6px 0 16px;padding:9px 11px;background:var(--black);border:1px solid var(--border);color:var(--white);border-radius:5px;font-family:'Space Mono',monospace;font-size:13px;outline:none;\">"
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">'
    + '<label style="font-size:11px;color:var(--grey);letter-spacing:0.08em;">Couleur</label>'
    + '<input id="nb-color" type="color" value="#9b59b6" style="width:50px;height:32px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;padding:2px;">'
    + '<span id="nb-preview" class="micro-badge" style="margin-left:auto;"></span>'
    + '</div>'
    + '<div style="display:flex;gap:8px;">'
    + "<button id=\"nb-ok\" style=\"flex:1;padding:11px;background:rgba(200,168,75,0.12);border:1px solid var(--gold-dim);color:var(--gold);border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;\">Ajouter</button>"
    + "<button id=\"nb-cancel\" style=\"flex:1;padding:11px;background:rgba(128,128,128,0.08);border:1px solid var(--border);color:var(--grey);border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;\">Annuler</button>"
    + '</div>';
  ov.appendChild(box);
  document.body.appendChild(ov);

  const nameEl = box.querySelector('#nb-name');
  const colorEl = box.querySelector('#nb-color');
  const preview = box.querySelector('#nb-preview');
  const refresh = () => {
    const col = customColors(colorEl.value);
    preview.textContent = nameEl.value.trim() || 'aperçu';
    preview.style.background = col.bg; preview.style.color = col.text; preview.style.border = '1px solid ' + col.border;
  };
  refresh();
  nameEl.addEventListener('input', refresh);
  colorEl.addEventListener('input', refresh);
  setTimeout(() => nameEl.focus(), 50);

  const close = () => ov.remove();
  box.querySelector('#nb-cancel').addEventListener('click', close);
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  const ok = () => {
    const label = nameEl.value.trim();
    if (!label) { nameEl.focus(); return; }
    close();
    onDone(label, colorEl.value);
  };
  box.querySelector('#nb-ok').addEventListener('click', ok);
  nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') ok(); });
}

/* ── Modal ── */
function openModal(musicianId) {
  modalTarget = musicians.find(x => x.id === musicianId);
  if (!modalTarget) return;
  renderModal();
  byId('modal-overlay').classList.add('open');
}

function renderModal() {
  const m = modalTarget;
  byId('modal-title').textContent = m.name || 'Nouveau musicien';
  byId('modal-comment').value = m.comment || '';
  const cur = byId('modal-current'); cur.innerHTML = '';
  if (!m.badges.length) {
    cur.innerHTML = '<span style="font-size:10px;color:var(--muted);font-style:italic">Aucun badge</span>';
  } else {
    m.badges.forEach((type, bidx) => {
      const btn = document.createElement('button');
      btn.className = 'modal-badge-active';
      applyBadgeStyle(btn, type);
      btn.textContent = labelOf(type);
      btn.addEventListener('click', () => { m.badges.splice(bidx, 1); renderModal(); renderTable(); });
      cur.appendChild(btn);
    });
  }
  const grid = byId('modal-grid'); grid.innerHTML = '';
  allTypes().forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'modal-add-btn';
    applyBadgeStyle(btn, type);
    btn.textContent = '+ ' + labelOf(type);
    btn.addEventListener('click', () => { if (m.badges.includes(type)) return; m.badges.push(type); renderModal(); renderTable(); });
    grid.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'modal-add-btn';
  addBtn.style.cssText = 'border:1px dashed var(--gold-dim);color:var(--gold-dim);background:transparent;';
  addBtn.textContent = '+ badge perso';
  addBtn.addEventListener('click', addCustomBadge);
  grid.appendChild(addBtn);
  byId('modal-comment').oninput = () => { m.comment = byId('modal-comment').value; renderTable(); };
}

function closeModal() { byId('modal-overlay').classList.remove('open'); modalTarget = null; }
byId('modal-close').addEventListener('click', closeModal);
byId('modal-overlay').addEventListener('click', e => { if (e.target === byId('modal-overlay')) closeModal(); });
let touchStartY = 0;
byId('modal-sheet').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
byId('modal-sheet').addEventListener('touchmove', e => { if (e.touches[0].clientY - touchStartY > 60) closeModal(); }, { passive: true });

/* ── Add musician ── */
function addMusician() {
  musicians.push({ id: nextId++, name: '', badges: [], comment: '' });
  renderTable(true); updateCount();
  const inputs = byId('musician-tbody').querySelectorAll('.name-editable');
  if (inputs.length) inputs[inputs.length-1].focus();
}
byId('btn-add').addEventListener('click', addMusician);
byId('btn-add-toolbar').addEventListener('click', addMusician);

function checkMobile() { byId('btn-add-toolbar').style.display = isMobile() ? 'inline-flex' : 'none'; }
checkMobile(); window.addEventListener('resize', checkMobile);

byId('band-name').addEventListener('input', () => {
  byId('band-title').textContent = byId('band-name').value.toUpperCase() + ' • FICHE TECHNIQUE';
});

/* ══════════════════════════════════════════
   THEME — clair (sépia) / sombre, suit l'appareil
══════════════════════════════════════════ */
const THEME_KEY = 'ssbbb_theme';
let currentMode = 'dark';

// Préférence du système d'exploitation
function systemMode() {
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'sepia' : 'dark';
}

// Applique un mode ('dark' | 'sepia'). persist=true → choix explicite mémorisé.
function applyMode(mode, persist) {
  currentMode = (mode === 'sepia') ? 'sepia' : 'dark';
  document.documentElement.setAttribute('data-theme', currentMode);
  const btn = byId('btn-theme-toggle');
  if (btn) {
    // l'icône montre la destination du clic
    btn.textContent = currentMode === 'dark' ? '☀️' : '🌙';
    btn.title = currentMode === 'dark' ? 'Passer en mode clair' : 'Passer en mode sombre';
  }
  if (persist) { try { localStorage.setItem(THEME_KEY, currentMode); } catch(e) {} }
}

// Au démarrage : choix mémorisé sinon préférence de l'appareil
function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch(e) {}
  applyMode(saved === 'sepia' || saved === 'dark' ? saved : systemMode(), false);

  // Suit l'appareil en direct tant que l'utilisateur n'a pas choisi explicitement
  if (window.matchMedia) {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const onChange = e => {
      let chosen = null;
      try { chosen = localStorage.getItem(THEME_KEY); } catch(err) {}
      if (chosen !== 'sepia' && chosen !== 'dark') applyMode(e.matches ? 'dark' : 'sepia', false);
    };
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else if (mq.addListener) mq.addListener(onChange);
  }
}

byId('btn-theme-toggle').addEventListener('click', () => {
  applyMode(currentMode === 'dark' ? 'sepia' : 'dark', true);
});

/* ══════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════ */

byId('btn-pdf').addEventListener('click', async () => {
  const pdfOverlay = byId('pdf-overlay');
  pdfOverlay.classList.add('active');

  try {
    const bandName = byId('band-name').value || 'GROUPE';
    const subtitle = byId('band-subtitle').value || 'FICHE TECHNIQUE';

    const extraBadges = headerBadges
      .filter(b => !b.fixed)
      .map(b => b.label);

    const allBadgeLabels = [`${musicians.length} musiciens`, ...extraBadges];

    const A4_H_MM = 297;
    const A4_W_PX = 794;
    const A4_H_PX = 1123;
    const SCALE   = 2;

    const target = byId('pdf-target');

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function truncate(str, max = 70) {
      const s = String(str ?? '');
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }

    const badgeHtml = type => {
      const cb = findCustom(type);
      const c = BADGE_COLORS[type] || (cb ? customColors(cb.color) : { bg: '#222', text: '#aaa', border: '#444' });
      return `<span style="
        display:inline-block;
        padding:3px 8px;
        font-size:8px;
        letter-spacing:0.10em;
        text-transform:uppercase;
        border-radius:2px;
        margin-right:3px;
        margin-bottom:3px;
        font-family:'Space Mono',monospace;
        background:${c.bg};
        color:${c.text};
        border:1px solid ${c.border};
        white-space:nowrap;
      ">${escapeHtml(labelOf(type))}</span>`;
    };

    const badgesBarHtml = allBadgeLabels.map(t => `
      <span style="
        border:1px solid ${pdfAccentDim};
        padding:4px 10px;
        font-size:8px;
        letter-spacing:0.18em;

        color:${pdfAccent};
        background:rgba(200,168,75,0.05);
        white-space:nowrap;
      ">${escapeHtml(t)}</span>
    `).join('');

    function buildRowsHtml(pageMusicians, startIndex) {
      return pageMusicians.map((m, i) => `
        <tr style="border-bottom:1px solid ${pdfBorder}; vertical-align:top;">
          <td style="
            padding:7px 10px;

            font-family:'Bebas Neue',sans-serif;
            font-size:15px;
            color:${pdfGrey};
            width:34px;
          ">${startIndex + i + 1}</td>

          <td style="

      return `

    async function paginateMusiciansAutomatically() {
      const pages = [];
      let cursor = 0;

      while (cursor < musicians.length) {
        const measurementPage = makeMeasurementPage();
        const tbody = measurementPage.querySelector('#measure-tbody');
        const body = measurementPage.querySelector('#measure-body');

        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 50));

        const pageRows = [];
        let lastGoodHtml = '';

        while (cursor < musicians.length) {
          pageRows.push(musicians[cursor]);
          tbody.innerHTML = pageRows
            .map((m, i) => buildSingleMeasureRow(m, (cursor - pageRows.length + 1) + i))
            .join('');

          await new Promise(r => requestAnimationFrame(r));

          const table = tbody.closest('table');
          const tableBottom = table.getBoundingClientRect().bottom;
          const bodyBottom = body.getBoundingClientRect().bottom;

          if (tableBottom > bodyBottom - 8) {
            pageRows.pop();
            tbody.innerHTML = lastGoodHtml;
            break;
          }

          lastGoodHtml = tbody.innerHTML;
          cursor++;
        }

        if (pageRows.length === 0 && cursor < musicians.length) {
          pageRows.push(musicians[cursor]);
          cursor++;
        }

        pages.push(pageRows);
        measurementPage.remove();
      }

      if (pages.length === 0) {
        pages.push([]);
      }

      return pages;
    }

    const pages = await paginateMusiciansAutomatically();
    const totalPages = pages.length;
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4',
      compress: true
    });

    target.style.width = `${A4_W_PX}px`;
    target.style.position = 'fixed';
    target.style.left = '-99999px';
    target.style.top = '0';

    let startIndex = 0;

    for (let pageIndex = 0; pageIndex < pages.length; pageIndex++) {
      const html = buildPageHtml(pages[pageIndex], startIndex, pageIndex, totalPages);
      target.innerHTML = html;

      await document.fonts.ready;
      await new Promise(r => setTimeout(r, 120));

      const canvas = await html2canvas(target.firstElementChild, {
        scale: SCALE,
        backgroundColor: pdfBg,
        useCORS: true,
        logging: false,
        width: A4_W_PX,
        height: A4_H_PX,
        windowWidth: A4_W_PX,
        windowHeight: A4_H_PX
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.92);

      if (pageIndex > 0) {
        doc.addPage('a4', 'portrait');
      }

      doc.addImage(imgData, 'JPEG', 0, 0, A4_W_MM, A4_H_MM);
      startIndex += pages[pageIndex].length;
    }

    target.innerHTML = '';
    target.style.width = '';
    target.style.position = '';
    target.style.left = '';
    target.style.top = '';

    const safeFilename = bandName.replace(/[^a-zA-Z0-9_\- ]/g, '').trim().replace(/\s+/g, '_') || 'GROUPE';
    doc.save(`${safeFilename}_fiche_technique_${year}.pdf`);

  } catch (err) {
    console.error('PDF error:', err);
    alert('Erreur lors de la génération du PDF.');
  } finally {
    byId('pdf-overlay').classList.remove('active');
  }
});
/* ══════════════════════════════════════════
   SAVE HTML
══════════════════════════════════════════ */
byId('btn-save').addEventListener('click', () => {
  const esc = s => s.replace(/"/g, '&quot;');
  const snapshot  = JSON.stringify(musicians);
  const hbSnap    = JSON.stringify(headerBadges);
  const bandName  = byId('band-name').value;
  const subtitle  = byId('band-subtitle').value;
  const phone     = byId('footer-phone').value;
  const year      = byId('footer-year').value;

  let html = document.documentElement.outerHTML;

  html = html.replace(/let musicians = \[[\s\S]*?\];/, 'let musicians = ' + snapshot + ';');
  html = html.replace(/let headerBadges = \[[\s\S]*?\];/, 'let headerBadges = ' + hbSnap + ';');
  html = html.replace(/id="band-name" value="[^"]*"/, `id="band-name" value="${esc(bandName)}"`);
  html = html.replace(/id="band-subtitle" value="[^"]*"/, `id="band-subtitle" value="${esc(subtitle)}"`);
  html = html.replace(/id="footer-phone" value="[^"]*"/, `id="footer-phone" value="${esc(phone)}"`);
  html = html.replace(/id="footer-year" value="[^"]*"/, `id="footer-year" value="${esc(year)}"`);

  // Embed a clean, import-friendly data blob (base64, Unicode-safe) so the file
  // can be re-opened/transformed via the "Ouvrir" button reliably
  const dataScript = `<script>window.__ficheData="${encodeState(captureState())}";<\/script>`;
  if (html.includes('window.__ficheData')) {
    html = html.replace(/<script>window\.__ficheData="[^"]*";<\/script>/, dataScript);
  } else {
    html = html.replace('</head>', dataScript + '</head>');
  }

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const safeFilename = bandName.replace(/[^a-zA-Z0-9_\- ]/g, '').trim().replace(/\s+/g, '_') || 'GROUPE';
  a.href = url; a.download = `${safeFilename}_fiche_technique_${year}.html`;
  a.click(); URL.revokeObjectURL(url);
});

/* ══════════════════════════════════════════
   LOCALSTORAGE AUTOSAVE
══════════════════════════════════════════ */
const LS_KEY = 'ssbbb_fiche';

function saveToStorage() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(captureState())); } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    return loadData(JSON.parse(raw));
  } catch(e) { return false; }
}

byId('band-name').addEventListener('input', saveToStorage);
byId('band-subtitle').addEventListener('input', saveToStorage);
byId('footer-phone').addEventListener('input', saveToStorage);
byId('footer-year').addEventListener('input', saveToStorage);

/* ══════════════════════════════════════════
   PORTABILITÉ — capture, nouvelle fiche, partage, import/export
   (aucun serveur requis : tout vit dans le fichier / le lien / le navigateur)
══════════════════════════════════════════ */

// État complet sérialisable de la fiche
function captureState() {
  return {
    v: 1,
    musicians,
    headerBadges,
    customBadges,
    bandName: byId('band-name').value,
    subtitle: byId('band-subtitle').value,
    phone:    byId('footer-phone').value,
    year:     byId('footer-year').value,
  };
}

// Applique des données SANS rendre (utilisé au chargement) — renvoie true si OK
function loadData(d) {
  if (!d || typeof d !== 'object') return false;
  if (Array.isArray(d.musicians)) {
    musicians = d.musicians;
    nextId = Math.max(0, ...musicians.map(m => +m.id || 0)) + 1;
  }
  if (Array.isArray(d.headerBadges)) {
    headerBadges = d.headerBadges;
    if (!headerBadges.some(b => b && b.fixed))
      headerBadges.unshift({ id: 'count', label: null, fixed: true });
    nextBadgeId = Math.max(0, ...headerBadges
      .filter(b => b && !b.fixed)
      .map(b => parseInt(String(b.id).replace(/\D/g, '')) || 0)) + 1;
  }
  if (d.bandName != null) {
    byId('band-name').value = d.bandName;
    byId('band-title').textContent = String(d.bandName).toUpperCase() + ' • FICHE TECHNIQUE';
  }
  if (d.subtitle != null) byId('band-subtitle').value = d.subtitle;
  if (d.phone    != null) byId('footer-phone').value  = d.phone;
  if (d.year     != null) byId('footer-year').value   = d.year;
  // Badges personnalisés (remplacés à chaque chargement)
  customBadges = Array.isArray(d.customBadges) ? d.customBadges : [];
  nextCustomId = Math.max(0, ...customBadges
    .map(b => parseInt(String(b.type).replace(/\D/g, '')) || 0)) + 1;
  return true;
}

// Applique + rend + sauvegarde (utilisé par import / nouvelle fiche / lien)
function applyState(d) {
  if (!loadData(d)) return false;
  renderHeaderBadges();
  buildPalette();
  renderTable();
  saveToStorage();
  return true;
}

// Encodage/décodage Unicode-safe (gère les emojis) pour lien URL et fichiers
function encodeState(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function decodeState(b64) { return JSON.parse(decodeURIComponent(escape(atob(b64)))); }

/* ── Petit toast de feedback ── */
function showToast(msg) {
  let t = byId('toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
      'background:#1c1c1c;border:1px solid var(--gold-dim);color:var(--gold);' +
      "padding:12px 22px;border-radius:6px;font-family:'Space Mono',monospace;font-size:12px;" +
      'letter-spacing:0.08em;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.6);opacity:0;' +
      'transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

/* ── Nouvelle fiche vierge ── */
function newFiche() {
  if (!confirm("Effacer la fiche actuelle et repartir d'une fiche vierge ?")) return;
  applyState({
    v: 1,
    musicians: [{ id: 1, name: '', badges: [], comment: '' }],
    headerBadges: [{ id: 'count', label: null, fixed: true }],
    bandName: '', subtitle: 'Fiche Technique',
    phone: '', year: String(new Date().getFullYear()),
  });
  byId('band-name').focus();
  showToast('Nouvelle fiche créée — à toi de jouer !');
}

/* ── Partager via un lien (aucun serveur) ── */
async function shareLink() {
  const url = location.origin + location.pathname + '#d=' + encodeState(captureState());
  if (navigator.share && isMobile()) {
    try { await navigator.share({ title: byId('band-name').value || 'Fiche technique', url }); }
    catch(e) { /* partage annulé par l'utilisateur */ }
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast('🔗 Lien copié — colle-le pour partager ta fiche');
  } catch(e) {
    prompt('Copie ce lien pour partager ta fiche :', url);
  }
}

/* ── Export JSON (données seules) ── */
function exportJson() {
  const blob = new Blob([JSON.stringify(captureState(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = (byId('band-name').value || 'fiche').replace(/[^a-zA-Z0-9_\- ]/g, '').trim().replace(/\s+/g, '_') || 'fiche';
  a.href = url; a.download = safe + '_fiche.json';
  a.click(); URL.revokeObjectURL(url);
}

/* ── Ouvrir / importer un fichier (.json ou .html sauvegardé) ── */
async function importFile(file) {
  try {
    const text = await file.text();
    let data = null;

    if (/\.json$/i.test(file.name) || text.trim().charAt(0) === '{') {
      data = JSON.parse(text);
    } else {
      // 1) Blob embarqué (fichiers HTML sauvegardés par cette app)
      const m = text.match(/window\.__ficheData="([^"]*)"/);
      if (m) {
        data = decodeState(m[1]);
      } else {
        // 2) Ancien format : extraction directe depuis le HTML
        data = {};
        const mus = text.match(/let musicians = (\[[\s\S]*?\]);/);
        const hb  = text.match(/let headerBadges = (\[[\s\S]*?\]);/);
        if (mus) try { data.musicians    = JSON.parse(mus[1]); } catch(e) {}
        if (hb)  try { data.headerBadges = JSON.parse(hb[1]);  } catch(e) {}
        const dom = new DOMParser().parseFromString(text, 'text/html');
        const gv = id => dom.getElementById(id)?.getAttribute('value');
        if (gv('band-name')     != null) data.bandName = gv('band-name');
        if (gv('band-subtitle') != null) data.subtitle = gv('band-subtitle');
        if (gv('footer-phone')  != null) data.phone    = gv('footer-phone');
        if (gv('footer-year')   != null) data.year     = gv('footer-year');
      }
    }

    if (data && (Array.isArray(data.musicians) || data.bandName != null)) {
      applyState(data);
      showToast('Fiche importée ✓ — tu peux la modifier');
    } else {
      alert('Fichier non reconnu.\nImporte un .json, ou un .html sauvegardé par cette application.');
    }
  } catch(e) {
    console.error('Import error:', e);
    alert('Impossible de lire ce fichier.');
  }
}

/* ── Câblage des boutons ── */
byId('btn-new').addEventListener('click', newFiche);
byId('btn-share').addEventListener('click', shareLink);
byId('btn-json').addEventListener('click', exportJson);
byId('btn-import').addEventListener('click', () => byId('file-input').click());
byId('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) importFile(f);
  e.target.value = '';
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function boot() {
  let loaded = false;

  // Thème (clair/sombre) — indépendant de la fiche, suit l'appareil
  initTheme();

  // 1) Fiche reçue via un lien partagé (#d=...) — prioritaire
  if (location.hash.startsWith('#d=')) {
    try { loaded = loadData(decodeState(location.hash.slice(3))); }
    catch(e) { console.error('Lien de fiche invalide :', e); }
  }

  // 2) Sinon, dernière fiche sauvegardée dans ce navigateur
  if (!loaded) {
    loaded = loadFromStorage();
  }

  // 3) Sinon : données d'exemple par défaut (déjà en mémoire)
  renderHeaderBadges();
  buildPalette();
  renderTable();

  // Après import d'un lien : on nettoie l'URL et on persiste localement,
  // pour que les modifications suivantes ne soient pas écrasées au rechargement
  if (location.hash.startsWith('#d=')) {
    history.replaceState(null, '', location.pathname + location.search);
    saveToStorage();
  }
}
boot();
